version: 2

jobs:
  build:
    docker:
      - image: "circleci/node:16.4.2-browsers-legacy@sha256:5b4606f7b2654b59845b58a7bb7ce327431224ba0fffcc26a9fb6eb3167ca539"
    steps:
      - checkout
      # Download and cache dependencies
      - restore_cache:
          keys:
          - v1-dependencies-{{ checksum "package.json" }}
          # fallback to using the latest cache if no exact match is found
          - v1-dependencies-
      - run: npm install
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}
      - run: npm test
      - store_artifacts:
          path: coverage
          prefix: coverage
